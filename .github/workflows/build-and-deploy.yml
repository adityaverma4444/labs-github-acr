name: Build and push the image (v2)

on:
  push:
    branches: ['main']
  workflow_dispatch:        # adds a manual "Run workflow" button

env:
  IMAGE_REPOSITORY_NAME: brezyweather
  IMAGE_TAG: 1.0.0

jobs:
  build:
    name: Build BrezyWeather container image
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push the image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.ACR_SERVER }}/${{ env.IMAGE_REPOSITORY_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_SERVER }}/${{ env.IMAGE_REPOSITORY_NAME }}:latest
            ${{ secrets.ACR_SERVER }}/${{ env.IMAGE_REPOSITORY_NAME }}:${{ github.sha }}
